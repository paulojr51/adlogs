services:
  postgres:
    image: postgres:16-alpine
    container_name: adlogs-postgres
    environment:
      POSTGRES_USER: adlogs
      POSTGRES_PASSWORD: adlogs
      POSTGRES_DB: adlogs
    ports:
      - "5434:5432"
    volumes:
      - adlogs-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U adlogs -d adlogs"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  adlogs-postgres-data:
