services:
  postgres:
    image: postgres:16-alpine
    container_name: adlogs-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-adlogs}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      POSTGRES_DB: ${POSTGRES_DB:-adlogs}
    command:
      - postgres
      - -c
      - max_connections=100
      - -c
      - shared_buffers=256MB
      - -c
      - log_min_duration_statement=1000
    ports:
      - "${POSTGRES_PORT:-5434}:5432"
    volumes:
      - adlogs-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    mem_limit: 1024m

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    container_name: adlogs-api
    restart: unless-stopped
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://${POSTGRES_USER:-adlogs}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-adlogs}
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET is required}
      JWT_SECRET_OLD: ${JWT_SECRET_OLD:-}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-15m}
      JWT_REFRESH_EXPIRES_IN: ${JWT_REFRESH_EXPIRES_IN:-7d}
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:-http://localhost}
      PORT: 3001
    depends_on:
      postgres:
        condition: service_healthy
    mem_limit: 512m

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-}
    container_name: adlogs-web
    restart: unless-stopped
    mem_limit: 512m

  nginx:
    image: nginx:alpine
    container_name: adlogs-nginx
    restart: unless-stopped
    ports:
      - "${HTTP_PORT:-80}:80"
      - "${HTTPS_PORT:-443}:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
    depends_on:
      - api
      - web
    mem_limit: 128m

volumes:
  adlogs-postgres-data:
